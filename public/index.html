<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wadbudget</title>
    <link rel="icon" href="./logo.png" type="image/png">
    <link rel="stylesheet" href="./styles.css?v=20260418-1">
</head>
<body>
  <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <h2>Wadbudget Planner</h2>
    <div class="plans-list" id="plansList"></div>
    <div class="new-plan-section">
      <h3>New Plan</h3>
      <div class="date-picker" id="newPlanDatePicker">
        <span class="select-wrapper"><select id="newPlanMonth"></select></span>
        <span class="select-wrapper"><select id="newPlanYear"></select></span>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button class="btn btn-primary btn-small" onclick="createFromTemplate()" style="flex:1;">From Template</button>
        <button class="btn btn-success btn-small" onclick="createEmptyPlan()" style="width:36px;padding:6px 10px;font-size:18px;" title="Create empty plan">+</button>
      </div>
    </div>
    <div class="account-panel" id="accountPanel">
      <div class="account-user">
        <div class="account-avatar-wrap">
          <img class="account-avatar" id="accountAvatar" alt="Profile avatar" referrerpolicy="no-referrer">
        </div>
        <div class="account-email" id="accountEmail"></div>
      </div>
      <button class="account-logout-btn" id="accountLogoutBtn" onclick="logout()" title="Logout" aria-label="Logout">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="no-plan">
      <h2>No plan selected</h2>
      <p>Select a plan from the sidebar or create a new one</p>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

    <script src="./app.js?v=20260418-1"></script>
</body>
</html>
